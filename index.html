<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JYJ Game Space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg:       #070010;
      --card-bg:  #12001e;
      --pink:     #ff2d78;
      --cyan:     #00e5ff;
      --text:     #f0eaff;
      --muted:    #4a3068;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }

    /* CRT scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.07) 3px,
        rgba(0, 0, 0, 0.07) 4px
      );
      pointer-events: none;
      z-index: 50;
    }

    /* Ambient pink bloom */
    body::after {
      content: '';
      position: fixed;
      width: 700px;
      height: 400px;
      background: radial-gradient(ellipse at center, rgba(255, 45, 120, 0.07) 0%, transparent 70%);
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    /* ─── LAYOUT ─── */
    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 56px;
      padding: 60px 24px;
    }

    /* ─── HEADER ─── */
    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
      text-align: center;
    }

    .title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.1rem, 3.5vw, 1.9rem);
      line-height: 1.8;
      text-align: center;
      color: var(--pink);
      text-shadow:
        0 0 8px  var(--pink),
        0 0 24px rgba(255, 45, 120, 0.55),
        0 0 60px rgba(255, 45, 120, 0.25);
      animation: flicker 9s infinite;
    }

    @keyframes flicker {
      0%,  93%,  100% {
        opacity: 1;
        text-shadow:
          0 0 8px  var(--pink),
          0 0 24px rgba(255, 45, 120, 0.55),
          0 0 60px rgba(255, 45, 120, 0.25);
      }
      94% { opacity: 0.55; text-shadow: none; }
      95% {
        opacity: 1;
        text-shadow: 0 0 8px var(--pink), 0 0 24px rgba(255, 45, 120, 0.55);
      }
      96% { opacity: 0.4;  text-shadow: none; }
      97% {
        opacity: 1;
        text-shadow:
          0 0 8px  var(--pink),
          0 0 24px rgba(255, 45, 120, 0.55),
          0 0 60px rgba(255, 45, 120, 0.25);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .title { animation: none; }
    }

    .rule {
      width: 64px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--pink), transparent);
      margin: 20px auto 0;
    }

    /* ─── GAME GRID ─── */
    .game-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .game-card {
      position: relative;
      width: 172px;
      height: 210px;
      background: var(--card-bg);
      border: 1px solid rgba(255, 45, 120, 0.25);
      border-radius: 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    }

    /* inner glow on hover */
    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 60%, rgba(255, 45, 120, 0.1) 0%, transparent 65%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .game-card:hover {
      border-color: var(--pink);
      transform: translateY(-5px);
      box-shadow:
        0  0 16px rgba(255, 45, 120, 0.18),
        0  0 40px rgba(255, 45, 120, 0.08);
    }

    .game-card:hover::before { opacity: 1; }

    .game-icon {
      font-size: 2.6rem;
      line-height: 1;
      position: relative;
    }

    .game-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      letter-spacing: 2px;
      color: var(--text);
      text-align: center;
    }

    .game-play {
      font-size: 0.6rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--pink);
      font-weight: 600;
    }

    /* corner accents on card */
    .game-card .corner {
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: var(--pink);
      border-style: solid;
      opacity: 0.5;
      transition: opacity 0.25s;
    }
    .game-card:hover .corner { opacity: 1; }
    .corner.tl { top: 6px;  left: 6px;  border-width: 1px 0 0 1px; }
    .corner.tr { top: 6px;  right: 6px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 6px; left: 6px;  border-width: 0 0 1px 1px; }
    .corner.br { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

    /* ─── FOOTER PROMPT ─── */
    .coin-prompt {
      font-size: 0.6rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--muted);
      animation: blink 1.4s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .coin-prompt { animation: none; opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="stage">

    <header>
      <p class="eyebrow">Welcome to</p>
      <h1 class="title">JYJ<br>GAME SPACE</h1>
      <div class="rule"></div>
    </header>

    <div class="game-grid">
      <a href="tetris.html" class="game-card">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>
        <div class="game-icon">🟦</div>
        <div class="game-label">TETRIS</div>
        <div class="game-play">PLAY</div>
      </a>
    </div>

    <p class="coin-prompt">— Select Your Game —</p>

  </div>
</body>
</html>
