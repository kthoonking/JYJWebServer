<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JYJ Portfolio — June 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #111111;
      --surface:#1A1A1A;
      --border: #2A2A2A;
      --text:   #E8E8E8;
      --muted:  #666666;
      --accent: #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
    }

    .topbar-left {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .topbar h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--accent);
    }

    .topbar-date {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 400;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: color 0.15s, border-color 0.15s;
    }

    .back-link:hover {
      color: var(--accent);
      border-color: #555;
    }

    .back-link svg { flex-shrink: 0; }

    /* ── CHART AREA ── */
    .chart-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .chart-frame {
      position: relative;
      width: 100%;
      max-width: 1100px;
      background: #0D0D0D;
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .chart-frame img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ── FOOTER ── */
    footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.74rem;
      color: var(--muted);
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    @media (max-width: 600px) {
      .topbar { padding: 14px 16px; }
      .chart-wrapper { padding: 16px; }
      footer { flex-direction: column; gap: 8px; text-align: center; }
      .footer-right { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>JYJ Portfolio</h1>
    <span class="topbar-date">June 13, 2026</span>
  </div>
  <a class="back-link" href="index.html">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 2L4 6l4 4"/>
    </svg>
    홈으로
  </a>
</div>

<div class="chart-wrapper">
  <div class="chart-frame">
    <img src="jyj_portfolio.png" alt="JYJ Portfolio Donut Chart — June 13, 2026">
  </div>
</div>

<footer>
  <span>JYJ Portfolio · Donut Chart v35 · 2026.06.13</span>
  <div class="footer-right">
    <span class="badge">PNG · 4896×3276</span>
    <span>For internal reference only</span>
  </div>
</footer>

</body>
</html>
